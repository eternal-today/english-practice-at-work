<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stealth AL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 40px 20px;
    line-height: 1.6;
  }
  
  .container { max-width: 760px; margin: 0 auto; }
  
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e5e5;
  }
  
  .title { font-size: 14px; font-weight: 600; color: #666; letter-spacing: 0.5px; }
  .progress { font-size: 13px; color: #888; }
  
  .korean {
    font-size: 18px;
    font-weight: 500;
    padding: 24px;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    margin-bottom: 24px;
    color: #222;
  }
  
  .assembled {
    min-height: 80px;
    padding: 16px;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
  }
  
  .assembled:empty::before {
    content: '여기에 청크가 조립됩니다';
    color: #bbb;
    font-size: 14px;
  }
  
  .chunks-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
    padding: 16px;
    background: #f5f5f5;
    border-radius: 6px;
    min-height: 80px;
  }
  
  .chunk {
    padding: 10px 16px;
    background: #fff;
    border: 1px solid #d4d4d4;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  
  .chunk:hover { border-color: #555; background: #fafafa; }
  .chunk.selected { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .chunk.in-assembled { background: #f0f0f0; color: #333; }
  
  .chunk-key {
    display: inline-block;
    font-size: 11px;
    color: #999;
    margin-right: 6px;
    font-weight: 600;
    min-width: 12px;
  }
  
  .chunk.selected .chunk-key { color: #aaa; }
  
  .controls { display: flex; gap: 12px; margin-bottom: 24px; }
  
  button.action {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  
  button.action:hover { background: #333; }
  button.action.secondary { background: #fff; color: #1a1a1a; border: 1px solid #d4d4d4; }
  button.action.secondary:hover { background: #f5f5f5; }
  button.action:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .feedback {
    padding: 16px 20px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  
  .feedback.correct {
    background: #f0f7f0;
    border: 1px solid #c8e0c8;
    color: #2a5a2a;
  }
  
  .feedback.incorrect {
    background: #faf0f0;
    border: 1px solid #e0c8c8;
    color: #7a2a2a;
  }
  
  .feedback .answer { margin-top: 8px; font-weight: 500; color: #1a1a1a; }
  
  .hint {
    font-size: 12px;
    color: #999;
    text-align: center;
    margin-top: 16px;
  }
  
  .loading { text-align: center; padding: 40px; color: #888; }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">STEALTH AL</div>
      <div class="progress" id="progress">—</div>
    </div>
    
    <div id="app">
      <div class="loading">불러오는 중...</div>
    </div>
    
    <div class="hint">
      0~9, a~f: 청크 토글 (선택/해제) · Enter: 정답 확인 / 다음 문제 · N: 다음 문제
    </div>
  </div>

<script>
// ===== 설정 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwm3Htan4X_r_zVgyGgnuxKhp6OdOKJGwvpOfJLBM3t08R4x1H0o67z57FysVW7BiWN/exec'; // ← 여기에 GAS 웹앱 URL 입력
const KEY_MAP = '0123456789abcdef'; // 최대 16개 청크

// ===== 상태 =====
let sentences = [];
let currentIdx = 0;
let chunks = [];      // [{ text, key, selected, orderInAssembled }]
let assembledOrder = []; // 조립 순서대로 chunk index 저장
let attemptCount = 0;
let isAnswered = false;

// ===== 초기화 =====
async function init() {
  try {
    const res = await fetch(`${GAS_URL}?action=getSentences`);
    const data = await res.json();
    sentences = shuffle(data.sentences);
    loadSentence(0);
  } catch (err) {
    document.getElementById('app').innerHTML = 
      `<div class="feedback incorrect">데이터를 불러오지 못했습니다: ${err.message}</div>`;
  }
}

// ===== 문장 로드 =====
function loadSentence(idx) {
  if (idx >= sentences.length) {
    document.getElementById('app').innerHTML = 
      `<div class="feedback correct">모든 문제를 완료했습니다. 새로고침하면 다시 시작합니다.</div>`;
    return;
  }
  
  currentIdx = idx;
  const s = sentences[idx];
  
  // 청크에 고정 키 부여 (셔플 후 0,1,2... 순서로 키 할당)
  const shuffled = shuffle([...s.chunks]);
  if (shuffled.length > KEY_MAP.length) {
    document.getElementById('app').innerHTML = 
      `<div class="feedback incorrect">청크가 너무 많습니다 (${shuffled.length}개). 최대 ${KEY_MAP.length}개까지 지원합니다.</div>`;
    return;
  }
  
  chunks = shuffled.map((text, i) => ({
    text,
    key: KEY_MAP[i],
    selected: false
  }));
  assembledOrder = [];
  attemptCount = 0;
  isAnswered = false;
  
  document.getElementById('progress').textContent = `${idx + 1} / ${sentences.length}`;
  render();
}

// ===== 렌더링 =====
function render() {
  const s = sentences[currentIdx];
  
  const assembledHTML = assembledOrder.map(i => {
    const c = chunks[i];
    return `<button class="chunk in-assembled" onclick="toggleChunk(${i})">
      <span class="chunk-key">${c.key}</span>${c.text}
    </button>`;
  }).join('');
  
  const poolHTML = chunks.map((c, i) => {
    return `<button class="chunk ${c.selected ? 'selected' : ''}" onclick="toggleChunk(${i})">
      <span class="chunk-key">${c.key}</span>${c.text}
    </button>`;
  }).join('');
  
  document.getElementById('app').innerHTML = `
    <div class="korean">${s.korean_text}</div>
    
    <div class="assembled" id="assembled">${assembledHTML}</div>
    
    <div class="chunks-pool" id="pool">${poolHTML}</div>
    
    <div class="controls">
      <button class="action" onclick="checkAnswer()" ${assembledOrder.length === 0 ? 'disabled' : ''}>
        정답 확인 (Enter)
      </button>
      <button class="action secondary" onclick="nextSentence()">
        다음 문제 (N)
      </button>
    </div>
    
    <div id="feedback-area"></div>
  `;
}

// ===== 청크 토글 =====
function toggleChunk(idx) {
  if (isAnswered) return;
  const c = chunks[idx];
  
  if (c.selected) {
    // 해제: assembledOrder에서 제거
    c.selected = false;
    assembledOrder = assembledOrder.filter(i => i !== idx);
  } else {
    // 선택: assembledOrder 맨 끝에 추가
    c.selected = true;
    assembledOrder.push(idx);
  }
  render();
}

// ===== 정답 확인 =====
function checkAnswer() {
  if (assembledOrder.length === 0 || isAnswered) return;
  
  attemptCount++;
  const s = sentences[currentIdx];
  const userText = assembledOrder.map(i => chunks[i].text).join(' ');
  const correctText = s.chunks.join(' ');
  const isCorrect = userText === correctText;
  
  logAttempt(s.id, isCorrect, attemptCount, userText);
  
  const feedbackArea = document.getElementById('feedback-area');
  if (isCorrect) {
    isAnswered = true;
    feedbackArea.innerHTML = `
      <div class="feedback correct">
        정답입니다 (${attemptCount}번째 시도)
        <div class="answer">${s.english_text}</div>
      </div>
    `;
  } else {
    feedbackArea.innerHTML = `
      <div class="feedback incorrect">다시 시도해보세요</div>
    `;
  }
}

// ===== 다음 문제 =====
function nextSentence() {
  loadSentence(currentIdx + 1);
}

// ===== 로그 전송 =====
async function logAttempt(sentenceId, isCorrect, attemptNumber, userInput) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'logAttempt',
        sentence_id: sentenceId,
        is_correct: isCorrect,
        attempt_number: attemptNumber,
        user_input: userInput
      })
    });
  } catch (err) {
    console.error('로그 전송 실패:', err);
  }
}

// ===== 키보드 입력 =====
document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea')) return;
  
  const key = e.key.toLowerCase();
  
  if (KEY_MAP.includes(key)) {
    const idx = KEY_MAP.indexOf(key);
    if (idx < chunks.length) {
      e.preventDefault();
      toggleChunk(idx);
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (isAnswered) {
      nextSentence();
    } else {
      checkAnswer();
    }
  } else if (key === 'n' && isAnswered) {
    nextSentence();
  }
});

// ===== 유틸 =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 시작 =====
init();
</script>
</body>
</html>
