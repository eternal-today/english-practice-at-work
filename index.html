<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stealth AL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 40px 20px;
    line-height: 1.6;
  }
  
  .container {
    max-width: 760px;
    margin: 0 auto;
  }
  
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e5e5;
  }
  
  .title {
    font-size: 14px;
    font-weight: 600;
    color: #666;
    letter-spacing: 0.5px;
  }
  
  .progress {
    font-size: 13px;
    color: #888;
  }
  
  .korean {
    font-size: 18px;
    font-weight: 500;
    padding: 24px;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    margin-bottom: 24px;
    color: #222;
  }
  
  .assembled {
    min-height: 80px;
    padding: 16px;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
  }
  
  .assembled:empty::before {
    content: '여기에 청크가 조립됩니다';
    color: #bbb;
    font-size: 14px;
  }
  
  .chunks-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
    padding: 16px;
    background: #f5f5f5;
    border-radius: 6px;
    min-height: 80px;
  }
  
  .chunk {
    padding: 10px 16px;
    background: #fff;
    border: 1px solid #d4d4d4;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    position: relative;
  }
  
  .chunk:hover {
    border-color: #555;
    background: #fafafa;
  }
  
  .chunk.in-assembled {
    background: #f0f0f0;
    color: #333;
  }
  
  .chunk-key {
    display: inline-block;
    font-size: 11px;
    color: #999;
    margin-right: 6px;
    font-weight: 600;
  }
  
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  
  button.action {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  
  button.action:hover { background: #333; }
  button.action.secondary { background: #fff; color: #1a1a1a; border: 1px solid #d4d4d4; }
  button.action.secondary:hover { background: #f5f5f5; }
  button.action:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .feedback {
    padding: 16px 20px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  
  .feedback.correct {
    background: #f0f7f0;
    border: 1px solid #c8e0c8;
    color: #2a5a2a;
  }
  
  .feedback.incorrect {
    background: #faf0f0;
    border: 1px solid #e0c8c8;
    color: #7a2a2a;
  }
  
  .feedback .answer {
    margin-top: 8px;
    font-weight: 500;
    color: #1a1a1a;
  }
  
  .hint {
    font-size: 12px;
    color: #999;
    text-align: center;
    margin-top: 16px;
  }
  
  .loading {
    text-align: center;
    padding: 40px;
    color: #888;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">STEALTH AL</div>
      <div class="progress" id="progress">—</div>
    </div>
    
    <div id="app">
      <div class="loading">불러오는 중...</div>
    </div>
    
    <div class="hint">
      숫자키 1~9: 청크 선택 · Backspace: 마지막 청크 제거 · Enter: 정답 확인 · N: 다음 문제
    </div>
  </div>

<script>
// ===== 설정 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwm3Htan4X_r_zVgyGgnuxKhp6OdOKJGwvpOfJLBM3t08R4x1H0o67z57FysVW7BiWN/exec'; // ← 여기에 GAS 웹앱 URL 입력

// ===== 상태 =====
let sentences = [];
let currentIdx = 0;
let pool = [];        // 남은 청크
let assembled = [];   // 조립된 청크
let attemptCount = 0;
let isAnswered = false;

// ===== 초기화 =====
async function init() {
  try {
    const res = await fetch(`${GAS_URL}?action=getSentences`);
    const data = await res.json();
    sentences = shuffle(data.sentences);
    loadSentence(0);
  } catch (err) {
    document.getElementById('app').innerHTML = 
      `<div class="feedback incorrect">데이터를 불러오지 못했습니다: ${err.message}</div>`;
  }
}

// ===== 문장 로드 =====
function loadSentence(idx) {
  if (idx >= sentences.length) {
    document.getElementById('app').innerHTML = 
      `<div class="feedback correct">모든 문제를 완료했습니다. 새로고침하면 다시 시작합니다.</div>`;
    return;
  }
  
  currentIdx = idx;
  const s = sentences[idx];
  pool = shuffle([...s.chunks]).map((text, i) => ({ text, id: i }));
  assembled = [];
  attemptCount = 0;
  isAnswered = false;
  
  document.getElementById('progress').textContent = `${idx + 1} / ${sentences.length}`;
  render();
}

// ===== 렌더링 =====
function render() {
  const s = sentences[currentIdx];
  
  document.getElementById('app').innerHTML = `
    <div class="korean">${s.korean_text}</div>
    
    <div class="assembled" id="assembled">
      ${assembled.map((c, i) => 
        `<button class="chunk in-assembled" onclick="removeChunk(${i})">${c.text}</button>`
      ).join('')}
    </div>
    
    <div class="chunks-pool" id="pool">
      ${pool.map((c, i) => 
        `<button class="chunk" onclick="addChunk(${i})">
          <span class="chunk-key">${i + 1}</span>${c.text}
        </button>`
      ).join('')}
    </div>
    
    <div class="controls">
      <button class="action" onclick="checkAnswer()" ${assembled.length === 0 ? 'disabled' : ''}>
        정답 확인 (Enter)
      </button>
      <button class="action secondary" onclick="nextSentence()">
        다음 문제 (N)
      </button>
    </div>
    
    <div id="feedback-area"></div>
  `;
}

// ===== 청크 조작 =====
function addChunk(poolIdx) {
  if (isAnswered) return;
  const chunk = pool.splice(poolIdx, 1)[0];
  assembled.push(chunk);
  render();
}

function removeChunk(asmIdx) {
  if (isAnswered) return;
  const chunk = assembled.splice(asmIdx, 1)[0];
  pool.push(chunk);
  render();
}

// ===== 정답 확인 =====
function checkAnswer() {
  if (assembled.length === 0 || isAnswered) return;
  
  attemptCount++;
  const s = sentences[currentIdx];
  const userText = assembled.map(c => c.text).join(' ');
  const correctText = s.chunks.join(' ');
  const isCorrect = userText === correctText;
  
  logAttempt(s.id, isCorrect, attemptCount, userText);
  
  const feedbackArea = document.getElementById('feedback-area');
  if (isCorrect) {
    isAnswered = true;
    feedbackArea.innerHTML = `
      <div class="feedback correct">
        정답입니다 (${attemptCount}번째 시도)
        <div class="answer">${s.english_text}</div>
      </div>
    `;
  } else {
    feedbackArea.innerHTML = `
      <div class="feedback incorrect">
        다시 시도해보세요
      </div>
    `;
  }
}

// ===== 다음 문제 =====
function nextSentence() {
  loadSentence(currentIdx + 1);
}

// ===== 로그 전송 =====
async function logAttempt(sentenceId, isCorrect, attemptNumber, userInput) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'logAttempt',
        sentence_id: sentenceId,
        is_correct: isCorrect,
        attempt_number: attemptNumber,
        user_input: userInput
      })
    });
  } catch (err) {
    console.error('로그 전송 실패:', err);
  }
}

// ===== 키보드 입력 =====
document.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < pool.length) addChunk(idx);
  } else if (e.key === 'Backspace' && !e.target.matches('input, textarea')) {
    e.preventDefault();
    if (assembled.length > 0) removeChunk(assembled.length - 1);
  } else if (e.key === 'Enter') {
    if (isAnswered) {
      nextSentence();
    } else {
      checkAnswer();
    }
  } else if (e.key.toLowerCase() === 'n') {
    nextSentence();
  }
});

// ===== 유틸 =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 시작 =====
init();
</script>
</body>
</html>
